<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İletişim - FS23 Mod Dünyası</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-XxHzrP4sjvC9pUpH0RivUqPqG+j0yRl0j6s7LOb2hzO+5oQ9F77FFe/f3m7qJhv5uXb09rM5yO7Y6qJv9xk0Ag==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
body{
  margin:0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(120deg, #050816, #0a0f24);
  color:white;
  text-align:center;
}
header{
  padding:40px 20px;
  font-size:48px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc,0 0 20px #00ffcc,0 0 40px #22ffee;
  animation: glow 2s infinite alternate;
}
@keyframes glow{
  0% { text-shadow:0 0 10px #00ffcc,0 0 20px #00ffcc,0 0 40px #22ffee;}
  100% { text-shadow:0 0 20px #00ffcc,0 0 40px #00ffcc,0 0 60px #22ffee;}
}

nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  background:#020617;
  box-shadow:0 0 25px #00ffff;
}
nav a{
  color:white;
  text-decoration:none;
  font-size:16px;
  padding:10px 20px;
  border-radius:10px;
  background:linear-gradient(45deg,#00ffff,#ff00ff);
  transition:0.3s;
}
nav a:hover{
  transform:scale(1.1);
}

/* CONTACT CARD */
section{
  margin:50px auto;
  max-width:700px;
  text-align:center;
}
.contact-card{
  background:#0f172a;
  border-radius:20px;
  padding:40px 20px;
  margin:20px 0;
  box-shadow:0 0 20px #00ffff;
  transition:transform 0.4s, box-shadow 0.4s;
}
.contact-card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 40px #ff00ff,0 0 60px #00ffcc;
}

/* ICON BUTTONS */
.social-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  margin:15px auto;
  width:120px;
  height:120px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  border-radius:50%;
  background:linear-gradient(45deg,#ff00ff,#00ffff,#22ff88);
  font-size:40px;
  transition:0.3s;
  box-shadow:0 0 15px #00ffff;
  position:relative;
}
.social-btn i.arrow{
  position:absolute;
  bottom:8px;
  font-size:18px;
}

/* HOVER EFFECT */
.social-btn:hover{
  transform:scale(1.3) rotate(-5deg);
  box-shadow:0 0 30px #ff00ff,0 0 50px #00ffff;
}

footer{
  text-align:center;
  padding:25px;
  background:#020617;
  box-shadow:0 0 20px #00ffff;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>📬 İletişim</header>

<nav>
<a href="index.html">Geri</a>
</nav>

<section class="contact-card">
<h2>📱 Sosyal Medya</h2>
<p>Beni TikTok’ta takip et:</p>
<a class="social-btn" href="https://www.tiktok.com/@fs23moddunyasi" target="_blank">
  <i class="fab fa-tiktok"></i>
  <i class="fas fa-arrow-right arrow"></i>
</a>
</section>

<section class="contact-card">
<h2>✉️ E-Posta Gönder</h2>
<p>Her türlü soru ve öneri için mail atabilirsiniz:</p>
<a class="social-btn" href="mailto:ornek@mail.com">
  <i class="fas fa-envelope"></i>
  <i class="fas fa-arrow-right arrow"></i>
</a>
</section>

<footer>
© 2026 FS23 Mod Dünyası
</footer>

</body>
</html>
